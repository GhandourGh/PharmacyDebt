[pytest]
# If you see hashlib "blake2" ERROR tracebacks at startup, run: python run_tests.py (filters noise before pytest loads).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
